<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teamprature</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url(131\ teamprecher\ img/wp6946084.webp);
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            justify-content: center;
            margin-top: 200px;
        }

        .allcontiant {
            height: 300px;
            width: 600px;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            box-shadow: 0 0 40px;
        }

        .allcontiant:hover {
            box-shadow: 10px 30px 40px;
            transition: 1500ms;
        }


        #form {
            display: flex;
            align-items: center;
            justify-content: space-around;
            font-size: 30px;
        }

        #addTemp {
            padding: 6px;
            border-radius: 10px;
            box-shadow: 0 0 20px;
        }

        #addNTemp {
            padding: 6px;
            border-radius: 10px;
            box-shadow: 0 0 20px;
        }


        #number {
            margin-left: 170px;
            margin-top: 50px;
            /* height: 40px; */
            padding: 10px;
            width: 220px;
            border-radius: 10px;
            background-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 20px;
        }

        #number:hover {
            width: 310px;
            transition: 3s;
            background-color: rgb(0, 255, 255 , 0.4);
        }

        #result {
            margin-left: 190px;
            margin-top: 10px;
            width: 270px;
            text-align: center;
            font-size: 30px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: space-around;
            font-size: 30px;
            margin-top: 20px;
        }

        #result:hover {
            transition: 2s;
            font-size: 35px;
            background-color: rgb(0, 0, 0 , 0.5);
        }


        #ConveartBtn {
            padding: 10px;
            border-radius: 10px;
            width: 150px;
            margin-top: 20px;
            box-shadow: 0 0 40px;
            background-color: rgb(2, 2, 2, 0.6);
            color: white;
            font-weight: bold;
        }

        #ConveartBtn:hover {
            background-color: rgb(255, 255, 255, 0.2);
            color: black;
            font-size: 14px;
            transition: all 1500ms;
        }

        #RemoveBtn {
            padding: 10px;
            border-radius: 10px;
            width: 150px;
            margin-top: 20px;
            box-shadow: 0 0 40px;
            background-color: rgb(2, 2, 2, 0.6);
            color: white;
            font-weight: bold;
        }

        #RemoveBtn:hover {
            background-color: rgb(255, 255, 255, 0.2);
            color: black;
            font-size: 14px;
            transition: all 1500ms;
        }
    </style>



</head>

<body>

    <div class="allcontiant">

        <form action="" id="form">
            <h2>Conveart :</h2>
            <label for="Conveart">
                <select name="Conveart" id="addTemp">
                    <option value="Celsuse">Celsuse (C)</option>
                    <option value="Farnhaid">Farnhaid (F)</option>
                    <option value="Kalvin">Kalvin (K)</option>
                </select>

            </label>

            <h2>To :</h2>
            <label for="To">
                <select name="To" id="addNTemp">
                    <option value="Celsuse">Celsuse (C)</option>
                    <option value="Farnhaid">Farnhaid (F)</option>
                    <option value="Kalvin">Kalvin (K)</option>
                </select>

            </label>

        </form>



        <div class="center">
            <input type="text" id="number" class="Conveart" placeholder="enter">
            <h2 id="result"></h2>
        </div>


        <div class="btn">
            <button id="ConveartBtn">Conveart</button>
            <button id="RemoveBtn">Remove</button>
        </div>

    </div>


    <script src="131 teampracher proj .js"></script>
</body>

</html>
